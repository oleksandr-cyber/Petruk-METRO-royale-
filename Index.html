<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METRO(royale)</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="title">
            <h1>METRO(royale)</h1>
            <h1>Shop</h1>
        </div>

        <img src="https://learn.logikaschool.com/uploads/student/3218632/699869d70e787.png">
    </header>

    <main>
        <section class="about-section">
            <div class="about-text">
                <h2>Про нас</h2>
                <h3>Швидко та безпечно!</h3>
            </div>
            <img src="https://learn.logikaschool.com/uploads/student/3218632/69871dfd0c474.png" alt="Metro Royale">
        </section>
        <h2 class="cat">КАТАЛОГ</h2>
        <section class="catalog">
            <article class="product">
                <div class="img-container">
                    <img src="https://learn.logikaschool.com/uploads/student/3218632/69871e16931a1.png">
                </div>
                <p class="name">МК 14 (СТАЛЬНИЙ ФРОНТ)</p>
                <p class="price">15 грн</p>
                <a href="#" class="buy-btn">КУПИТИ</a>
            </article>

            <article class="product">
                <div class="img-container">
                    <img src="https://learn.logikaschool.com/uploads/student/3218632/69871e38daa12.png">
                </div>
                <p class="name">МК 14 (КОБРА)</p>
                <p class="price">20 грн</p>
                <a href="#" class="buy-btn">КУПИТИ</a>
            </article>

            <article class="product">
                <div class="img-container">
                    <img src="https://learn.logikaschool.com/uploads/student/3218632/69871e9550631.png">
                </div>
                <p class="name">C12K (ВИЩОЇ ЯКОСТІ)</p>
                <p class="price">25 грн</p>
                <a href="#" class="buy-btn">КУПИТИ</a>
            </article>
        </section>
        <section class="map">
            <h2>
                Де нас знайти?
            </h2>
            <img src="https://learn.logikaschool.com/uploads/student/3218632/69871eaa4d278.png">
        </section>
    </main>

    <footer>
        <img class="logo" src="https://learn.logikaschool.com/uploads/student/3218632/699869d70e787.png">
        <p> PROTOTYPE
            !!!FAKE!!!</p>
    </footer>
</body>

</html>
